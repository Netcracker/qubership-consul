{{- if and .Values.integrationTests.enabled .Values.integrationTests.atpReport.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ template "consul-integration-tests.name" . }}-atp-storage-secret
  labels:
    {{- include "consul-service.defaultLabels" . | nindent 4 }}
type: Opaque
stringData:
  atp-storage-username: {{ .Values.integrationTests.atpStorage.username }}
  atp-storage-password: {{ .Values.integrationTests.atpStorage.password }}
{{- end }}
