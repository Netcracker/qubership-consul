{{- if .Values.integrationTests.enabled }}
{{- $s3AliasesData := fromYaml (include "backupDaemon.s3Aliases" .) }}
{{- $defaultS3AliasName := "" }}
{{- range $s3AliasesData.items }}
  {{- if and .name .spec .spec.default }}
    {{- $defaultS3AliasName = .name }}
  {{- end }}
{{- end }}
{{- $integrationTestsPodSecretsMount := include "consul.podSecretsMountPath" (dict "service" "consul-integration-tests") -}}
{{- $aclBootstrapSecretKey := include "consul.aclBootstrapSecretKey" . -}}
{{- $hasIntegrationTestsPodSecrets := or .Values.global.acls.manageSystemACLs .Values.backupDaemon.enabled .Values.backupDaemon.s3.enabled .Values.integrationTests.atpReport.enabled .Values.monitoring.enabled -}}
kind: Deployment
apiVersion: apps/v1
metadata:
  name: {{ template "consul-integration-tests.name" . }}
  labels:
    {{- include "consul-service.defaultLabels" . | nindent 4 }}
    app.kubernetes.io/name: {{ template "consul-integration-tests.name" . }}
    name: {{ template "consul-integration-tests.name" . }}
    app.kubernetes.io/instance: {{ cat (printf "%s"  (include "consul-integration-tests.name" .)) .Values.DELIMITER .Release.Namespace | nospace | trunc 63 }}
    app.kubernetes.io/technology: python
spec:
  selector:
    matchLabels:
      name: {{ template "consul-integration-tests.name" . }}
  strategy:
    type: Recreate
  replicas: {{ template "consul.replicasForSingleService" . }}
  template:
    metadata:
      labels:
        {{- with .Values.global.extraLabels }}
          {{- toYaml . | nindent 8 -}}
        {{- end }}
        {{- with .Values.integrationTests.extraLabels }}
          {{- toYaml . | nindent 8 -}}
        {{- end }}
        {{- include "consul-service.defaultLabels" . | nindent 8 }}
        app.kubernetes.io/name: {{ template "consul-integration-tests.name" . }}
        name: {{ template "consul-integration-tests.name" . }}
      annotations:
        checksum/consul-integration-tests-pod-secrets: {{ printf "%v-%v-%v-%v-%v" .Values.global.acls.manageSystemACLs .Values.backupDaemon.enabled .Values.backupDaemon.s3.enabled .Values.integrationTests.atpReport.enabled .Values.monitoring.enabled | sha256sum }}
    spec:
      serviceAccountName: {{ template "consul.fullname" . }}-integration-tests
      {{- if .Values.integrationTests.affinity }}
      affinity:
        {{ .Values.integrationTests.affinity | toJson }}
      {{- end }}
      {{- if not (eq (include "openshift.enabled" .) "true") }}
      securityContext:
        {{- include "consul.globalPodSecurityContext" . | nindent 8 }}
        {{- with .Values.integrationTests.securityContext }}
        {{- toYaml . | nindent 8 -}}
        {{- end }}
      {{- end }}
      containers:
        - name: {{ template "consul-integration-tests.name" . }}
          image: {{ template "consul-integration-tests.image" . }}
          ports:
            - containerPort: 8080
              protocol: TCP
          env:
            - name: PYTHONDONTWRITEBYTECODE
              value: "1"
            {{- if $hasIntegrationTestsPodSecrets }}
            - name: INTEGRATION_TESTS_SECRETS_DIR
              value: {{ $integrationTestsPodSecretsMount | quote }}
            {{- end }}
            - name: TAGS
              value: {{ .Values.integrationTests.tags }}
            {{- if .Values.deployDescriptor -}}
            {{- if index .Values.deployDescriptor "consul-service" }}
            - name: MONITORED_IMAGES
              value: {{ include "consul.monitoredImages" . }}
            {{- end }}
            {{- end }}
            - name: CONSUL_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            {{- if .Values.integrationTests.statusWritingEnabled }}
            - name: STATUS_CUSTOM_RESOURCE_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: STATUS_CUSTOM_RESOURCE_NAME
              value: "{{ template "consul.fullname" . }}-integration-tests-runner"
            - name: STATUS_WRITING_ENABLED
              value: "{{ .Values.integrationTests.statusWritingEnabled }}"
            - name: ONLY_INTEGRATION_TESTS
              value: "false"
            - name: IS_SHORT_STATUS_MESSAGE
              value: "{{ .Values.integrationTests.isShortStatusMessage }}"
            {{- end }}
            - name: CONSUL_HOST
              value: {{ template "consul.fullname" . }}-server
            - name: CONSUL_PORT
              value: "{{ coalesce .Values.integrationTests.consulPort (include "consul.port" .) }}"
            - name: CONSUL_SCHEME
              value: "{{ template "consul.scheme" . }}"
            {{- if .Values.backupDaemon.enabled }}
            - name: CONSUL_BACKUP_DAEMON_HOST
              value: {{ template "consul.fullname" . }}-backup-daemon
            - name: CONSUL_BACKUP_DAEMON_PORT
              value: {{ include "backupDaemon.port" . | quote }}
            - name: CONSUL_BACKUP_DAEMON_PROTOCOL
              value:  {{ template "backupDaemon.protocol" . }}
            {{- end }}
            {{- if .Values.backupDaemon.s3.enabled }}
            - name: S3_ENABLED
              value: "true"
            - name: S3_URL
              value: {{ .Values.backupDaemon.s3.url | quote }}
            - name: S3_BUCKET
              value: {{ .Values.backupDaemon.s3.bucket | quote }}
            - name: S3_ALIASES_SECRET_NAME
              value: {{ template "consul.fullname" . }}-backup-daemon-s3-aliases
            - name: S3_DEFAULT_ALIAS_NAME
              value: {{ default "default" $defaultS3AliasName | quote }}
            {{- end }}
            - name: DATACENTER_NAME
              value: {{ .Values.global.datacenter }}
            - name: RANDOM_RUN_TRIGGER
              value: {{ randAlphaNum 10 | quote }}
            {{- if .Values.integrationTests.atpReport.enabled }}
            # ATP Storage variables for S3 integration
            - name: ATP_REPORT_ENABLED
              value: {{ .Values.integrationTests.atpReport.enabled | quote }}
            - name: ATP_STORAGE_PROVIDER
              value: {{ .Values.integrationTests.atpReport.atpStorage.provider | quote }}
            - name: ATP_STORAGE_SERVER_URL
              value: {{ .Values.integrationTests.atpReport.atpStorage.serverUrl | quote }}
            - name: ATP_STORAGE_SERVER_UI_URL
              value: {{ .Values.integrationTests.atpReport.atpStorage.serverUiUrl | quote }}
            - name: ATP_STORAGE_BUCKET
              value: {{ .Values.integrationTests.atpReport.atpStorage.bucket | quote }}
            - name: ATP_STORAGE_REGION
              value: {{ .Values.integrationTests.atpReport.atpStorage.region | quote }}
            - name: ATP_REPORT_VIEW_UI_URL
              value: {{ .Values.integrationTests.atpReportViewUiUrl | quote }}
            {{- end }}
            - name: ENVIRONMENT_NAME
              value: {{ .Values.integrationTests.environmentName | quote }}
            - name: ENABLE_JIRA_INTEGRATION
              value: {{ .Values.integrationTests.enableJiraIntegration | quote }}
            {{- if .Values.monitoring.enabled }}
            - name: PROMETHEUS_URL
              value: {{ .Values.integrationTests.prometheusUrl }}
            {{- end }}
          resources:
            requests:
              memory: {{ default "256Mi" .Values.integrationTests.resources.requests.memory }}
              cpu: {{ default "200m" .Values.integrationTests.resources.requests.cpu }}
            limits:
              memory: {{ default "256Mi" .Values.integrationTests.resources.limits.memory }}
              cpu: {{ default "400m" .Values.integrationTests.resources.limits.cpu }}
          securityContext:
            {{- include "consul.globalContainerSecurityContext" . | nindent 12 }}
          livenessProbe:
            exec:
              command: ["sh", "-c", "true"]
            initialDelaySeconds: 20
            timeoutSeconds: 5
            periodSeconds: 20
            successThreshold: 1
            failureThreshold: 5
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - 'cat /opt/robot/output/result.txt | grep -q "RESULT: TESTS PASSED"'
            initialDelaySeconds: 20
            timeoutSeconds: 5
            periodSeconds: 20
            successThreshold: 1
            failureThreshold: 5
          volumeMounts:
            {{- include "consul.tmpVolumeMount" . | nindent 12 }}
            {{- if $hasIntegrationTestsPodSecrets }}
            - name: consul-integration-tests-pod-secrets
              mountPath: {{ $integrationTestsPodSecretsMount }}
              readOnly: true
            {{- end }}
          {{- if and .Values.backupDaemon.enabled .Values.global.tls.enabled .Values.backupDaemon.tls.enabled (include "backupDaemon.tlsSecretName" .) }}
            - name: backup-tls-certs
              mountPath: /consul/tls/backup/
          {{- end }}
            - name: output
              mountPath: /opt/robot/output
            {{- if .Values.global.tls.enabled }}
            - name: consul-ca-cert
              mountPath: /consul/tls/ca/
              readOnly: true
            {{- end }}
          terminationMessagePath: /dev/termination-log
          imagePullPolicy: Always
      volumes:
        {{- include "consul.tmpVolume" "32Mi" | nindent 8 }}
        {{- if $hasIntegrationTestsPodSecrets }}
        - name: consul-integration-tests-pod-secrets
          projected:
            defaultMode: 420
            sources:
              {{- if .Values.global.acls.manageSystemACLs }}
              {{- if .Values.integrationTests.secret.aclToken }}
              - secret:
                  name: {{ template "consul-integration-tests.name" . }}-secret
                  items:
                    - key: acl-token
                      path: CONSUL_TOKEN
              {{- else }}
              - secret:
                  name: {{ include "consul.aclBootstrapSecretName" . }}
                  items:
                    - key: {{ $aclBootstrapSecretKey }}
                      path: CONSUL_TOKEN
              {{- end }}
              {{- end }}
              {{- if .Values.backupDaemon.enabled }}
              - secret:
                  name: {{ template "consul.fullname" . }}-backup-daemon-secret
                  items:
                    - key: username
                      path: CONSUL_BACKUP_DAEMON_USERNAME
                    - key: password
                      path: CONSUL_BACKUP_DAEMON_PASSWORD
              {{- end }}
              {{- if .Values.backupDaemon.s3.enabled }}
              - secret:
                  name: {{ template "consul.fullname" . }}-s3-secret
                  items:
                    - key: s3-key-id
                      path: S3_KEY_ID
                    - key: s3-key-secret
                      path: S3_KEY_SECRET
              {{- end }}
              {{- if .Values.integrationTests.atpReport.enabled }}
              - secret:
                  name: {{ template "consul-integration-tests.name" . }}-atp-storage-secret
                  items:
                    - key: atp-storage-username
                      path: ATP_STORAGE_USERNAME
                    - key: atp-storage-password
                      path: ATP_STORAGE_PASSWORD
              {{- end }}
              {{- if .Values.monitoring.enabled }}
              - secret:
                  name: {{ template "consul-integration-tests.name" . }}-monitoring-secret
                  items:
                    - key: prometheus-user
                      path: PROMETHEUS_USER
                    - key: prometheus-password
                      path: PROMETHEUS_PASSWORD
              {{- end }}
        {{- end }}
      {{- if and .Values.backupDaemon.enabled .Values.global.tls.enabled .Values.backupDaemon.tls.enabled (include "backupDaemon.tlsSecretName" .) }}
        - name: backup-tls-certs
          secret:
            secretName: {{ template "backupDaemon.tlsSecretName" . }}
      {{- end }}
        - name: output
          emptyDir: {}
        {{- if .Values.global.tls.enabled }}
        - name: consul-ca-cert
          secret:
            secretName: {{ template "consul.caCertSecretName" . }}
            items:
              {{- if .Values.global.tls.certManager.enabled }}
              - key: "ca.crt"
              {{- else }}
              - key: {{ default "tls.crt" .Values.global.tls.caCert.secretKey }}
              {{- end }}
                path: tls.crt
        {{- end }}
{{- end }}
