{{- if .Values.tests.enabled }}
apiVersion: v1
kind: Pod
metadata:
  name: "{{ template "consul.fullname" . }}-test"
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ template "consul.name" . }}
    chart: {{ template "consul.chart" . }}
    heritage: {{ .Release.Service }}
    release: {{ .Release.Name }}
    {{- include "consul-service.defaultLabels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test-success
spec:
  {{- if not (eq (include "openshift.enabled" .) "true") }}
  securityContext:
    {{- include "consul.globalPodSecurityContext" . | nindent 4 }}
  {{- end }}
  volumes:
  {{- if .Values.global.tls.enabled }}
    {{- if not (and .Values.externalServers.enabled .Values.externalServers.useSystemRoots) }}
    - name: consul-ca-cert
      secret:
        secretName: {{ template "consul.caCertSecretName" . }}
        items:
        - key: {{ default "tls.crt" .Values.global.tls.caCert.secretKey }}
          path: tls.crt
    {{- end }}
    - name: consul-auto-encrypt-ca-cert
      emptyDir:
        medium: "Memory"
  {{- end }}
  {{- if and .Values.global.tls.enabled .Values.global.tls.enableAutoEncrypt }}
  initContainers:
  {{- include "consul.getAutoEncryptClientCA" . | nindent 2 }}
  {{- end }}
  containers:
    - name: consul-test
      image: {{ template "consul.image" . }}
      securityContext:
        {{- include "consul.globalContainerSecurityContext" . | nindent 8 }}
      env:
        - name: HOST_IP
          valueFrom:
            fieldRef:
              fieldPath: status.hostIP
        {{- if .Values.global.tls.enabled }}
        - name: CONSUL_HTTP_ADDR
          value: https://$(HOST_IP):8501
        - name: CONSUL_CACERT
          value: /consul/tls/ca/tls.crt
        {{- else }}
        - name: CONSUL_HTTP_ADDR
          value: http://$(HOST_IP):8500
        {{- end }}
      volumeMounts:
        {{- if .Values.global.tls.enabled }}
        {{- if .Values.global.tls.enableAutoEncrypt }}
        - name: consul-auto-encrypt-ca-cert
          mountPath: /consul/tls/ca
          readOnly: true
        {{- else }}
        - name: consul-ca-cert
          mountPath: /consul/tls/ca
          readOnly: true
        {{- end }}
        {{- end }}
      command:
        - "/bin/sh"
        - "-ec"
        - |
            servers=$(consul members | grep -c consul-server || true)
            alive=$(consul members | grep consul-server | grep -c alive || true)
            if [ "${servers}" != "${alive}" ]; then
              echo "Failed because not all consul servers are available"
              exit 1
            fi
      resources:
        requests:
          memory: 64Mi
          cpu: 25m
        limits:
          memory: 128Mi
          cpu: 50m
  restartPolicy: Never
{{- end }}
