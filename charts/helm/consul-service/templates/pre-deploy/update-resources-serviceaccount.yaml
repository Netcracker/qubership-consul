apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ template "consul.fullname" . }}-update-resources
  labels:
    {{- include "consul-service.defaultLabels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation
{{- with .Values.global.imagePullSecrets }}
imagePullSecrets:
{{- range . }}
  - name: {{ .name }}
{{- end }}
{{- end }}