version: '2.2'
services:
  consul:
    image: hashicorp/consul:1.6.2
    ports:
      - 8500:8500
  consul-backup-daemon:
    image: ghcr.io/netcracker/qubership-consul-backup-daemon:latest@sha256:df0b4a792d99a81d70b4d6ce7bd1d76732e7c4932bae4c5f800fda55741b4e08
    ports:
      - 8080:8080
    links:
      - consul
    environment:
      - CONSUL_HOST=consul
      - CONSUL_PORT=8500
      - BACKUP_SCHEDULE=0 * * * *
      - EVICTION_POLICY=1h/1h
      - CONSUL_BACKUP_DAEMON_DEBUG=DEBUG
      - LOG_LEVEL=DEBUG