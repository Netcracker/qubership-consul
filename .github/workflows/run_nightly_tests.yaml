name: Run Nightly Consul Pipeline

permissions:
  contents: read

on:
  schedule:
    - cron: '0 0 * * *'

jobs:
  Nightly-Consul-Pipeline:
    uses: Netcracker/qubership-test-pipelines/.github/workflows/consul.yaml@006f4c99bd9167307208d09252aa005208a4af0d # v1.13.2
    with:
      service_branch: 'main'
      pipeline_branch: '006f4c99bd9167307208d09252aa005208a4af0d' # v1.8.0 renovate: depName=Netcracker/qubership-test-pipelines
      scope: 'nightly'
      allure: false
    secrets:
      AWS_S3_ACCESS_KEY_ID: ${{secrets.AWS_S3_ACCESS_KEY_ID}}
      AWS_S3_ACCESS_KEY_SECRET: ${{secrets.AWS_S3_ACCESS_KEY_SECRET}}
