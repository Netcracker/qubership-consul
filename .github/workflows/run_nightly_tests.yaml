name: Run Nightly Consul Pipeline

permissions:
  contents: read

on:
  schedule:
    - cron: '0 0 * * *'

jobs:
  Nightly-Consul-Pipeline:
    uses: Netcracker/qubership-test-pipelines/.github/workflows/consul.yaml@a23bed13d489e8fe6e335fe717258dea12cbb006 #v1.6.0
    with:
      service_branch: 'main'
      pipeline_branch: 'a23bed13d489e8fe6e335fe717258dea12cbb006' # v1.6.0 renovate: depName=Netcracker/qubership-test-pipelines
      scope: 'nightly'
    secrets:
      AWS_S3_ACCESS_KEY_ID: ${{secrets.AWS_S3_ACCESS_KEY_ID}}
      AWS_S3_ACCESS_KEY_SECRET: ${{secrets.AWS_S3_ACCESS_KEY_SECRET}}
