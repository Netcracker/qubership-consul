name: Run Nightly Consul Pipeline

permissions:
  contents: read

on:
#  push
  schedule:
    - cron: '0 0 * * *'

jobs:
  Nightly-Consul-Pipeline:
    uses: Netcracker/qubership-test-pipelines/.github/workflows/consul.yaml@fix/update_monitoring_version # v1.8.0
    with:
      service_branch: 'main'
      pipeline_branch: 'fix/update_monitoring_version' # v1.8.0 renovate: depName=Netcracker/qubership-test-pipelines
      scope: 'nightly'
    secrets:
      AWS_S3_ACCESS_KEY_ID: ${{secrets.AWS_S3_ACCESS_KEY_ID}}
      AWS_S3_ACCESS_KEY_SECRET: ${{secrets.AWS_S3_ACCESS_KEY_SECRET}}
