name: Run Nightly Consul Pipeline

permissions:
  contents: read

on:
  schedule:
    - cron: '0 0 * * *'

jobs:
  Nightly-Consul-Pipeline:
    uses: Netcracker/qubership-test-pipelines/.github/workflows/consul.yaml@ddc741b38bac5dc4834b8f6827c9f6d16abf0db8 # v1.14.1
    with:
      service_branch: 'main'
      pipeline_branch: 'ddc741b38bac5dc4834b8f6827c9f6d16abf0db8' # v1.14.1 renovate: depName=Netcracker/qubership-test-pipelines
      scope: 'nightly'
      allure: true
      verify_timeout_minutes: 30
    secrets:
      AWS_S3_ACCESS_KEY_ID: ${{secrets.AWS_S3_ACCESS_KEY_ID}}
      AWS_S3_ACCESS_KEY_SECRET: ${{secrets.AWS_S3_ACCESS_KEY_SECRET}}
