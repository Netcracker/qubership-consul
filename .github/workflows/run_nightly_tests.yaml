name: Run Nightly Consul Pipeline

permissions:
  contents: read

on:
  push

jobs:
  Nightly-Consul-Pipeline:
    uses: Netcracker/qubership-test-pipelines/.github/workflows/consul.yaml@fix_monitoring_manddatory # v1.14.0
    with:
      service_branch: 'main'
      pipeline_branch: 'fix_monitoring_manddatory' # v1.14.0 renovate: depName=Netcracker/qubership-test-pipelines
      scope: 'nightly'
      allure: true
      verify_timeout_minutes: 30
    secrets:
      AWS_S3_ACCESS_KEY_ID: ${{secrets.AWS_S3_ACCESS_KEY_ID}}
      AWS_S3_ACCESS_KEY_SECRET: ${{secrets.AWS_S3_ACCESS_KEY_SECRET}}
