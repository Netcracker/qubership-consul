name: Run Nightly Consul Pipeline

permissions:
  contents: read

on:
  schedule:
    - cron: '0 0 * * *'

jobs:
  Nightly-Consul-Pipeline:
    uses: Netcracker/qubership-test-pipelines/.github/workflows/consul.yaml@277bfa19072ddcbfe1e4df2253b9b70c61a1a68e # v1.13.1
    with:
      service_branch: 'main'
      pipeline_branch: '277bfa19072ddcbfe1e4df2253b9b70c61a1a68e' # v1.13.1 renovate: depName=Netcracker/qubership-test-pipelines
      scope: 'nightly'
    secrets:
      AWS_S3_ACCESS_KEY_ID: ${{secrets.AWS_S3_ACCESS_KEY_ID}}
      AWS_S3_ACCESS_KEY_SECRET: ${{secrets.AWS_S3_ACCESS_KEY_SECRET}}
